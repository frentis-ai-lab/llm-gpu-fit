name: Data Refresh

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync
      - name: Run refresh and push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PUSH_TO_HF: "1"
        run: uv run python scripts/refresh_data.py
